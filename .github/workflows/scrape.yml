name: NYC rental scrape (manual)

# OFF by default. This project is meant to run locally on demand; this workflow
# exists only as an OPTIONAL way to run a scrape on GitHub's infrastructure
# (off your home IP). There is no schedule — it runs only when you click
# "Run workflow" in the Actions tab.
#
# It needs a DATABASE_URL secret pointing at a persistent database (e.g. Neon
# Postgres) to be useful; without one, results go to a throwaway SQLite file
# that is discarded when the runner is destroyed.
on:
  workflow_dispatch:   # manual trigger only

concurrency:
  group: rental-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrape
        env:
          # Optional: set in repo Settings -> Secrets and variables -> Actions.
          # A Neon Postgres URL, e.g. postgresql+psycopg://USER:PASS@HOST/neondb?sslmode=require
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/run_scrape.py
