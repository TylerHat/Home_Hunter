<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home Hunter — NYC Rentals</title>
<style>
  :root {
    --bg: #0f1216; --panel: #181d24; --panel2: #1f2630; --line: #2a313c;
    --text: #e7edf3; --muted: #94a3b8; --accent: #4ea1ff; --accent2: #34d399;
    --chip: #243042; --pet: #3b2f1a; --nofee: #14342a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header {
    padding: 18px 22px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #141a21, #0f1216); position: sticky; top: 0; z-index: 5;
  }
  h1 { margin: 0; font-size: 20px; letter-spacing: .2px; }
  h1 small { color: var(--muted); font-weight: 400; font-size: 13px; }
  .stats { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .stats b { color: var(--text); }
  main { max-width: 1200px; margin: 0 auto; padding: 18px 22px 60px; }

  .filters {
    display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    align-items: end; background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px; margin-bottom: 18px;
  }
  .filters label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--muted); }
  .filters input, .filters select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font-size: 14px;
  }
  .checks { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .checks label { flex-direction: row; align-items: center; gap: 6px; color: var(--text); font-size: 13px; }
  .actions { display: flex; gap: 10px; }
  button {
    background: var(--accent); color: #06121f; border: 0; border-radius: 8px;
    padding: 9px 16px; font-weight: 600; font-size: 14px; cursor: pointer;
  }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  button:hover { filter: brightness(1.08); }

  .count { color: var(--muted); font-size: 13px; margin: 4px 2px 14px; }
  .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; display: flex; flex-direction: column; gap: 8px;
  }
  .rent { font-size: 22px; font-weight: 700; color: var(--accent2); }
  .rent span { font-size: 12px; color: var(--muted); font-weight: 400; }
  .title { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .title a { color: var(--text); text-decoration: none; }
  .title a:hover { color: var(--accent); }
  .meta { color: var(--muted); font-size: 13px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .chip { font-size: 11.5px; background: var(--chip); color: #cdd9e8; border-radius: 999px; padding: 3px 9px; }
  .chip.pet { background: var(--pet); color: #f5d8a0; }
  .chip.nofee { background: var(--nofee); color: #8ff0c4; }
  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 6px; }
  .posted { color: var(--muted); font-size: 12px; }
  .maplink { color: var(--accent); text-decoration: none; font-size: 12px; }
  .empty { text-align: center; color: var(--muted); padding: 50px 20px; }
  .empty code { background: var(--panel2); padding: 2px 7px; border-radius: 6px; color: var(--text); }
  .more { display: flex; justify-content: center; margin-top: 22px; }

  .viewbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin: 4px 2px 14px; }
  .viewbar .count { margin: 0; }
  .viewtoggle { display: flex; }
  .viewtoggle button { border-radius: 0; }
  .viewtoggle button:first-child { border-radius: 8px 0 0 8px; }
  .viewtoggle button:last-child { border-radius: 0 8px 8px 0; border-left: 0; }
  .viewtoggle button.active { background: var(--accent); color: #06121f; border-color: var(--accent); }

  .tablewrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
  table { border-collapse: collapse; width: 100%; font-size: 13.5px; }
  thead th {
    background: var(--panel2); color: var(--muted); text-align: left; font-weight: 600;
    padding: 10px 12px; white-space: nowrap; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--line);
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }
  thead th.num { text-align: right; }
  thead th .arrow { font-size: 10px; }
  tbody td { padding: 9px 12px; border-bottom: 1px solid var(--line); }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover { background: var(--panel); }
  tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody td.rentcell { color: var(--accent2); font-weight: 700; white-space: nowrap; }
  tbody td.titlecell a { color: var(--text); text-decoration: none; }
  tbody td.titlecell a:hover { color: var(--accent); }
  tbody td.nowrap { white-space: nowrap; }

  /* --- advanced neighborhood selection --- */
  .nbhd-cell { display: flex; flex-direction: column; gap: 5px; justify-content: flex-end; grid-column: span 2; }
  .nbhd-cell .cap { font-size: 12px; color: var(--muted); }
  .nbhd-cell button { white-space: nowrap; }
  .nbhdchips { display: flex; flex-wrap: wrap; gap: 6px; margin: -6px 2px 16px; }
  .nbhdchips:empty { display: none; }
  .nbhdchips .nchip {
    display: inline-flex; align-items: center; gap: 4px; font-size: 12px;
    background: var(--chip); color: #cdd9e8; border-radius: 999px; padding: 4px 6px 4px 11px;
  }
  .nbhdchips .nchip button {
    background: transparent; color: var(--muted); border: 0; padding: 0 2px;
    font-size: 13px; line-height: 1; cursor: pointer; font-weight: 700;
  }
  .nbhdchips .nchip button:hover { color: var(--text); }

  .modal[hidden] { display: none; }
  .modal {
    position: fixed; inset: 0; z-index: 50; background: rgba(4,8,12,.72);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    width: min(980px, 96vw); height: min(86vh, 840px); display: flex; flex-direction: column;
    overflow: hidden; box-shadow: 0 18px 60px rgba(0,0,0,.5);
  }
  .modal-head {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    border-bottom: 1px solid var(--line); flex-wrap: wrap;
  }
  .modal-head strong { font-size: 15px; }
  .modal-head .spacer { flex: 1; }
  .modal-head input {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; font-size: 14px; min-width: 180px;
  }
  .modal-body { position: relative; flex: 1; background: #0b0f14; min-height: 0; }
  #nbhdMap { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  #nbhdMap.panning { cursor: grabbing; }
  #nbhdMap path {
    stroke: #0b0f14; stroke-width: .6; cursor: pointer; vector-effect: non-scaling-stroke;
    transition: opacity .1s;
  }
  #nbhdMap path:hover { stroke: var(--text); stroke-width: 1.2; }
  #nbhdMap path.sel { stroke: var(--accent2); stroke-width: 1.6; }
  .maploading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px;
  }
  .maploading[hidden] { display: none; }
  .modal-foot { padding: 9px 14px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>🏙️ Home Hunter <small>— NYC apartment rentals</small></h1>
  <div class="stats" id="stats">Loading…</div>
</header>

<main>
  <form class="filters" id="filters" onsubmit="return false">
    <label>Borough
      <select name="borough" id="borough">
        <option value="">All boroughs</option>
        <option>Manhattan</option><option>Brooklyn</option><option>Queens</option>
        <option>Bronx</option><option>Staten Island</option>
      </select>
    </label>
    <div class="nbhd-cell">
      <span class="cap">Neighborhoods</span>
      <button class="ghost" id="openMap" type="button">🗺️ Advanced Neighborhood Selection</button>
    </div>
    <label>Min rent ($)<input type="number" name="min_rent" min="0" step="100" placeholder="0" /></label>
    <label>Max rent ($)<input type="number" name="max_rent" min="0" step="100" placeholder="any" /></label>
    <label>Min beds<input type="number" name="min_beds" min="0" step="1" placeholder="any" /></label>
    <label>Min sqft<input type="number" name="min_sqft" min="0" step="50" placeholder="any" /></label>
    <div class="checks">
      <label><input type="checkbox" name="no_fee" /> No fee</label>
      <label><input type="checkbox" name="cats_ok" /> Cats</label>
      <label><input type="checkbox" name="dogs_ok" /> Dogs</label>
    </div>
    <div class="actions">
      <button id="apply">Apply</button>
      <button class="ghost" id="reset" type="button">Reset</button>
    </div>
  </form>

  <div class="nbhdchips" id="nbhdChips"></div>

  <div class="viewbar">
    <div class="count" id="count"></div>
    <div class="viewtoggle">
      <button class="ghost active" id="viewCards" type="button">▦ Cards</button>
      <button class="ghost" id="viewTable" type="button">▤ Table</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="tablewrap" id="tablewrap" style="display:none">
    <table id="table">
      <thead><tr></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="more"><button class="ghost" id="loadmore" style="display:none">Load more</button></div>
</main>

<div class="modal" id="mapModal" hidden>
  <div class="modal-card">
    <div class="modal-head">
      <strong>Select neighborhoods</strong>
      <input id="nbhdSearch" type="search" placeholder="Search neighborhood…" />
      <span class="muted" id="nbhdSelCount"></span>
      <span class="spacer"></span>
      <button class="ghost" id="nbhdReset" type="button">Reset view</button>
      <button class="ghost" id="nbhdClear" type="button">Clear</button>
      <button id="nbhdApply" type="button">Apply</button>
      <button class="ghost" id="nbhdClose" type="button">✕ Close</button>
    </div>
    <div class="modal-body">
      <svg id="nbhdMap" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="maploading" id="mapLoading">Loading map…</div>
    </div>
    <div class="modal-foot">Click neighborhoods to toggle · scroll to zoom · drag to pan · shading shows how many listings each has.</div>
  </div>
</div>

<script>
const PAGE = 60;
let offset = 0, lastCount = 0;
let rows = [];                     // every listing loaded so far (re-rendered on sort/toggle)
let loaded = false;                // a fetch has completed at least once
let view = "cards";                // "cards" | "table"
let sortKey = "price", sortDir = "asc";

const $ = (s) => document.querySelector(s);
const fmt = (n) => n == null ? null : Number(n).toLocaleString();
const money = (n) => n == null ? "—" : "$" + Number(n).toLocaleString();

function beds(n) { return n == null ? null : (n === 0 ? "studio" : n + " bd"); }
function postedDate(s) {
  if (!s) return "";
  const d = new Date(s);
  return isNaN(d) ? "" : "posted " + d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

function query(extra) {
  const f = $("#filters");
  const p = new URLSearchParams();
  for (const el of f.elements) {
    if (!el.name) continue;
    if (el.type === "checkbox") { if (el.checked) p.set(el.name, "true"); }
    else if (el.value !== "") p.set(el.name, el.value);
  }
  for (const n of selected) p.append("neighborhood", n);  // map selection (repeatable)
  p.set("sort", sortKey);          // server sorts the whole dataset, not just the loaded page
  p.set("order", sortDir);
  p.set("limit", PAGE);
  p.set("offset", extra?.offset ?? 0);
  return p.toString();
}

function card(r) {
  const meta = [beds(r.beds), r.baths != null ? r.baths + " ba" : null,
                r.sqft != null ? fmt(r.sqft) + " ft²" : null,
                [r.neighborhood_key || r.neighborhood, r.borough].filter(Boolean).join(", ") || null]
               .filter(Boolean).join(" · ");
  const chips = [];
  if (r.no_fee) chips.push(`<span class="chip nofee">no fee</span>`);
  if (r.laundry) chips.push(`<span class="chip">${esc(r.laundry)}</span>`);
  if (r.parking) chips.push(`<span class="chip">${esc(r.parking)}</span>`);
  if (r.housing_type) chips.push(`<span class="chip">${esc(r.housing_type)}</span>`);
  if (r.cats_ok) chips.push(`<span class="chip pet">cats</span>`);
  if (r.dogs_ok) chips.push(`<span class="chip pet">dogs</span>`);
  const map = (r.latitude != null && r.longitude != null)
    ? `<a class="maplink" target="_blank" href="https://www.google.com/maps?q=${r.latitude},${r.longitude}">📍 map</a>` : "";
  return `<article class="card">
    <div class="rent">${money(r.price)} <span>/mo</span></div>
    <div class="title"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title || "(no title)")}</a></div>
    <div class="meta">${esc(meta) || "—"}</div>
    <div class="chips">${chips.join("")}</div>
    <div class="foot"><span class="posted">${postedDate(r.posted_at)}</span>${map}</div>
  </article>`;
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ---- table view: columns + sorting ----
// Clicking a header re-fetches from the server sorted by that column (key must
// match a key in app.py's _SORT_COLUMNS) so the sort covers every listing, not
// just the loaded page. tableRow() renders cells in this same order; keep them in sync.
const COLUMNS = [
  { key: "price", label: "Rent", num: true },
  { key: "title", label: "Title" },
  { key: "beds", label: "Beds", num: true },
  { key: "baths", label: "Baths", num: true },
  { key: "sqft", label: "Sqft", num: true },
  { key: "neighborhood", label: "Neighborhood" },
  { key: "borough", label: "Borough" },
  { key: "posted_at", label: "Posted", date: true },
];

function buildHeader() {
  const tr = $("#table thead tr");
  tr.innerHTML = COLUMNS.map((c) =>
    `<th data-key="${c.key}" class="${c.num ? "num" : ""}">${esc(c.label)} <span class="arrow"></span></th>`
  ).join("");
  for (const th of tr.querySelectorAll("th[data-key]")) {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc";
      else { sortKey = key; sortDir = "asc"; }
      load(true);   // re-fetch page 1 in the new order so the sort spans every listing
    });
  }
}

function tableRow(r) {
  const map = (r.latitude != null && r.longitude != null)
    ? `<a class="maplink" target="_blank" href="https://www.google.com/maps?q=${r.latitude},${r.longitude}">📍</a>` : "";
  const title = `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title || "(no title)")}</a>`;
  const bedTxt = r.beds == null ? "—" : (r.beds === 0 ? "studio" : r.beds);
  return `<tr>
    <td class="num rentcell">${money(r.price)}</td>
    <td class="titlecell">${title}</td>
    <td class="num">${bedTxt}</td>
    <td class="num">${r.baths == null ? "—" : r.baths}</td>
    <td class="num">${r.sqft == null ? "—" : fmt(r.sqft)}</td>
    <td>${esc(r.neighborhood_key || r.neighborhood || "—")}</td>
    <td>${esc(r.borough || "—")}</td>
    <td class="nowrap">${postedDate(r.posted_at) || "—"} ${map}</td>
  </tr>`;
}

function renderTable() {
  // rows already arrive in sorted order from the server (see query()), so just render them.
  $("#tbody").innerHTML = rows.map(tableRow).join("");
  for (const th of document.querySelectorAll("#table th[data-key]")) {
    const active = th.dataset.key === sortKey;
    th.classList.toggle("sorted", active);
    th.querySelector(".arrow").textContent = active ? (sortDir === "asc" ? "▲" : "▼") : "";
  }
}

function emptyHTML() {
  return `<div class="empty">No listings yet.<br>Run a scrape first:<br><br>
    <code>python scripts/run_scrape.py --area mnh --once</code></div>`;
}

function render() {
  $("#viewCards").classList.toggle("active", view === "cards");
  $("#viewTable").classList.toggle("active", view === "table");
  if (loaded && rows.length === 0) {
    $("#grid").style.display = "grid";
    $("#grid").innerHTML = emptyHTML();
    $("#tablewrap").style.display = "none";
    return;
  }
  if (view === "table") {
    $("#grid").style.display = "none";
    $("#tablewrap").style.display = "block";
    renderTable();
  } else {
    $("#tablewrap").style.display = "none";
    $("#grid").style.display = "grid";
    $("#grid").innerHTML = rows.map(card).join("");
  }
}

async function load(reset) {
  if (reset) { offset = 0; rows = []; }
  const res = await fetch("/rentals?" + query({ offset }));
  const batch = await res.json();
  lastCount = batch.length;
  rows.push(...batch);
  offset += batch.length;
  loaded = true;
  $("#count").textContent = offset ? `Showing ${offset} listing${offset === 1 ? "" : "s"}` : "";
  $("#loadmore").style.display = lastCount === PAGE ? "inline-block" : "none";
  render();
}

async function loadStats() {
  try {
    const s = await (await fetch("/stats")).json();
    if (!s.total) { $("#stats").textContent = "No data yet — run a scrape to populate the database."; return; }
    const boroughs = Object.entries(s.by_borough).map(([b, c]) => `${b}: ${c}`).join("  ·  ");
    $("#stats").innerHTML = `<b>${fmt(s.total)}</b> listings · rent <b>${money(s.rent.min)}</b>–<b>${money(s.rent.max)}</b>
      (avg <b>${money(s.rent.avg)}</b>)<br>${esc(boroughs)}`;
  } catch { $("#stats").textContent = ""; }
}

$("#apply").addEventListener("click", () => load(true));
$("#reset").addEventListener("click", () => {
  $("#filters").reset(); selected.clear(); renderChips(); load(true);
});
$("#loadmore").addEventListener("click", () => load(false));
$("#filters").addEventListener("submit", () => load(true));
$("#viewCards").addEventListener("click", () => { view = "cards"; render(); });
$("#viewTable").addEventListener("click", () => { view = "table"; render(); });

// ---- Advanced neighborhood selection (inline SVG map of NYC neighborhoods) ----
const selected = new Set();      // committed neighborhood names → drive query + chips
let draft = new Set();           // edited inside the modal until Apply
let nbhdCounts = {};             // neighborhood name → listing count (from /stats)
let mapBuilt = false;
let vb = null, vbHome = null;    // current / fit-all viewBox {x,y,w,h}
const SVGNS = "http://www.w3.org/2000/svg";

function nbhdFill(name) {
  if (draft.has(name)) return "rgba(52,211,153,.85)";        // selected → green
  const c = nbhdCounts[name] || 0;
  if (!c) return "#1b2230";                                  // no listings → muted
  const maxc = Math.max(1, ...Object.values(nbhdCounts));
  const a = 0.18 + 0.62 * Math.sqrt(c / maxc);              // more listings → brighter
  return `rgba(78,161,255,${a.toFixed(3)})`;
}

function eachFeatureCoord(geom, fn) {
  if (!geom) return;
  const polys = geom.type === "Polygon" ? [geom.coordinates]
              : geom.type === "MultiPolygon" ? geom.coordinates : [];
  for (const poly of polys) for (const ring of poly) for (const pt of ring) fn(pt[0], pt[1]);
}

async function buildMap() {
  if (mapBuilt) return;
  let gj;
  try {
    const [g, s] = await Promise.all([
      fetch("/neighborhoods.geojson").then((r) => r.json()),
      fetch("/stats").then((r) => r.json()).catch(() => ({})),
    ]);
    gj = g; nbhdCounts = (s && s.by_neighborhood) || {};
  } catch { $("#mapLoading").textContent = "Could not load the map."; return; }

  let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
  for (const f of gj.features) eachFeatureCoord(f.geometry, (lng, lat) => {
    if (lng < minLng) minLng = lng; if (lng > maxLng) maxLng = lng;
    if (lat < minLat) minLat = lat; if (lat > maxLat) maxLat = lat;
  });
  const kx = Math.cos((minLat + maxLat) / 2 * Math.PI / 180), K = 1000;
  const px = (lng) => (lng - minLng) * kx * K;               // equirectangular, north-up
  const py = (lat) => (maxLat - lat) * K;
  vbHome = { x: 0, y: 0, w: (maxLng - minLng) * kx * K, h: (maxLat - minLat) * K };
  vb = { ...vbHome }; applyViewBox();

  const ringD = (ring) =>
    "M" + ring.map((p) => px(p[0]).toFixed(1) + " " + py(p[1]).toFixed(1)).join("L") + "Z";
  const svg = $("#nbhdMap");
  const frag = document.createDocumentFragment();
  for (const f of gj.features) {
    if (!f.geometry) continue;
    const name = f.properties.neighborhood;
    const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
    let d = "";
    for (const poly of polys) for (const ring of poly) d += ringD(ring);
    const path = document.createElementNS(SVGNS, "path");
    path.setAttribute("d", d);
    path.setAttribute("fill-rule", "evenodd");
    path.dataset.name = name;
    path.style.fill = nbhdFill(name);
    const c = nbhdCounts[name] || 0;
    const title = document.createElementNS(SVGNS, "title");
    title.textContent = `${name} — ${c} listing${c === 1 ? "" : "s"}`;
    path.appendChild(title);
    path.addEventListener("click", () => toggleNbhd(name, path));
    frag.appendChild(path);
  }
  svg.appendChild(frag);
  $("#mapLoading").hidden = true;
  mapBuilt = true;
  wireZoomPan(svg);
}

function applyViewBox() { $("#nbhdMap").setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`); }

function clampViewBox() {
  vb.w = Math.min(vb.w, vbHome.w); vb.h = Math.min(vb.h, vbHome.h);
  vb.x = Math.max(vbHome.x, Math.min(vb.x, vbHome.x + vbHome.w - vb.w));
  vb.y = Math.max(vbHome.y, Math.min(vb.y, vbHome.y + vbHome.h - vb.h));
}

function toggleNbhd(name, path) {
  if (draft.has(name)) draft.delete(name); else draft.add(name);
  path.classList.toggle("sel", draft.has(name));
  path.style.fill = nbhdFill(name);
  $("#nbhdSelCount").textContent = draft.size ? `${draft.size} selected` : "";
}

function refreshPaths() {
  for (const p of $("#nbhdMap").querySelectorAll("path")) {
    p.classList.toggle("sel", draft.has(p.dataset.name));
    p.style.fill = nbhdFill(p.dataset.name);
  }
  $("#nbhdSelCount").textContent = draft.size ? `${draft.size} selected` : "";
}

function wireZoomPan(svg) {
  const toSvg = (cx, cy) => {
    const r = svg.getBoundingClientRect();
    const scale = Math.min(r.width / vb.w, r.height / vb.h);   // preserveAspectRatio=meet
    return {
      x: vb.x + (cx - r.left - (r.width - vb.w * scale) / 2) / scale,
      y: vb.y + (cy - r.top - (r.height - vb.h * scale) / 2) / scale,
    };
  };
  svg.addEventListener("wheel", (e) => {
    e.preventDefault();
    const p = toSvg(e.clientX, e.clientY);
    const f = e.deltaY < 0 ? 0.85 : 1 / 0.85;
    const nw = Math.min(vbHome.w, Math.max(vbHome.w / 60, vb.w * f));
    const nh = nw * (vb.h / vb.w);
    vb.x = p.x - (p.x - vb.x) * (nw / vb.w);
    vb.y = p.y - (p.y - vb.y) * (nh / vb.h);
    vb.w = nw; vb.h = nh; clampViewBox(); applyViewBox();
  }, { passive: false });

  let down = null, dragged = false;
  svg.addEventListener("pointerdown", (e) => { down = { x: e.clientX, y: e.clientY }; dragged = false; });
  svg.addEventListener("pointermove", (e) => {
    if (!down) return;
    if (!dragged && Math.hypot(e.clientX - down.x, e.clientY - down.y) > 4) {
      dragged = true; svg.classList.add("panning");
    }
    if (!dragged) return;
    const r = svg.getBoundingClientRect();
    const scale = Math.min(r.width / vb.w, r.height / vb.h);
    vb.x -= (e.clientX - down.x) / scale; vb.y -= (e.clientY - down.y) / scale;
    down = { x: e.clientX, y: e.clientY }; clampViewBox(); applyViewBox();
  });
  const end = () => { down = null; svg.classList.remove("panning"); };
  svg.addEventListener("pointerup", end);
  svg.addEventListener("pointerleave", end);
  // Swallow the click that ends a drag so it doesn't toggle a neighborhood.
  svg.addEventListener("click", (e) => { if (dragged) { e.stopPropagation(); dragged = false; } }, true);
}

function applySearch(term) {
  term = term.trim().toLowerCase();
  for (const p of $("#nbhdMap").querySelectorAll("path"))
    p.style.opacity = (!term || p.dataset.name.toLowerCase().includes(term)) ? "1" : "0.12";
}

function renderChips() {
  const box = $("#nbhdChips");
  box.innerHTML = [...selected].sort().map((n) =>
    `<span class="nchip">${esc(n)}<button type="button" data-n="${esc(n)}" title="remove">✕</button></span>`
  ).join("");
  for (const b of box.querySelectorAll("button"))
    b.addEventListener("click", () => { selected.delete(b.dataset.n); renderChips(); load(true); });
}

function openMap() {
  draft = new Set(selected);
  $("#mapModal").hidden = false;
  buildMap().then(() => { if (mapBuilt) refreshPaths(); });
}
function closeMap() { $("#mapModal").hidden = true; }
function applyMap() {
  selected.clear(); for (const n of draft) selected.add(n);
  renderChips(); closeMap(); load(true);
}

$("#openMap").addEventListener("click", openMap);
$("#nbhdClose").addEventListener("click", closeMap);
$("#nbhdApply").addEventListener("click", applyMap);
$("#nbhdClear").addEventListener("click", () => { draft.clear(); refreshPaths(); });
$("#nbhdReset").addEventListener("click", () => { if (vbHome) { vb = { ...vbHome }; applyViewBox(); } });
$("#nbhdSearch").addEventListener("input", (e) => applySearch(e.target.value));
$("#mapModal").addEventListener("click", (e) => { if (e.target.id === "mapModal") closeMap(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !$("#mapModal").hidden) closeMap(); });

buildHeader();
loadStats();
load(true);
</script>
</body>
