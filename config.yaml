# Home Hunter — NYC apartment-rental scrape configuration (Craigslist)
#
# Targets NYC apartment rentals. Edit `areas` to choose boroughs and `filters`
# to bound rent/beds/pets. Craigslist has light bot protection, so this runs
# reliably on free servers without a real browser.

# Craigslist site subdomain (newyork.craigslist.org -> "newyork").
city: newyork

# Craigslist NYC sub-region codes (boroughs) to scrape.
#   mnh = Manhattan   brk = Brooklyn   que = Queens
#   brx = Bronx       stn = Staten Island
areas:
  - mnh
  - brk
  - que
  - brx
  - stn

# Rental filters applied to the Craigslist search.
filters:
  min_rent: null      # null = no bound (monthly USD)
  max_rent: null
  min_beds: null
  max_beds: null
  cats_ok: null       # true = only cat-friendly listings
  dogs_ok: null       # true = only dog-friendly listings
  max_pages: 3        # search pages per borough (~120 listings/page)

# Data source. Active backends: "craigslist" and "renthop" (both plain HTTP, no
# browser; RentHop uses curl_cffi Chrome TLS impersonation to clear Cloudflare).
# "zillow" is legacy code under src/home_hunter/scraper/zillow/ (not wired in).
# The same `areas` borough codes and `filters` apply to both active sources.
source: craigslist

# Open each listing's detail page to capture square footage + amenities
# (laundry, parking, pets, no-fee). false = faster, but only search-page fields.
detail_fetch: true

# Confirm rent-stabilized status against NY DHCR's building list by geocoding each
# address-bearing listing to a BBL (via the free NYC GeoSearch API). Only affects
# sources that carry a street address (RentHop); a no-op for Craigslist. The UI
# shows a solid green badge when confirmed, outline when only text-claimed.
rent_stab_confirm: true

# Scam / fake-listing heuristics. Listings are flagged (badged in the UI), never
# dropped — use the UI "Hide suspected scams" toggle to filter them out. Photos
# dominate: a listing with no photos trips the threshold on its own.
flags:
  enabled: true
  threshold: 100            # risk score at/above this -> flagged
  no_photo_weight: 100      # no photos alone reaches the threshold
  market_ratio: 0.5         # flag if rent < 50% of its (borough, beds) median
  min_cohort_size: 5        # ignore medians from cohorts smaller than this

# Respectful-scraping knobs. Craigslist tolerates modest, paced access.
rate_limit:
  min_delay_seconds: 2       # random delay floor between requests
  max_delay_seconds: 5       # random delay ceiling
  max_retries: 3             # retries on 403/429/5xx before skipping
  backoff_base_seconds: 4    # exponential backoff base
  detail_concurrency: 4      # detail pages fetched in parallel (each worker keeps its own delay)
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
